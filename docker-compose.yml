version: "3.9"

services:
  api:
    build: .
    command: python scripts/run_api.py
    ports:
      - "8000:8000"
    volumes:
      - mantra_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  worker:
    build: .
    command: python scripts/run_worker.py
    volumes:
      - mantra_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mantra_data:
